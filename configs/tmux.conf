# devops-terminal tmux config — DevOps/SRE setup
# cheat sheet: prefix = Ctrl+b
#   prefix+I         ติดตั้ง/อัปเดต plugins (TPM)
#   prefix+Tab       extrakto: หยิบ token จากจอ (pod name, IP, hash) ด้วย fzf
#   prefix+F         tmux-fzf: เมนูจัดการ session/window/pane
#   prefix+u         เปิด URL ที่โผล่บนจอ (เลือกด้วย fzf)
#   prefix+S         sync panes: พิมพ์ครั้งเดียวลงทุก pane
#   prefix+k         เปิด k9s เป็น popup
#   prefix+i         AI chat popup (kiro-cli)
#   prefix+t         scratch terminal popup
#   prefix+Ctrl+s/r  save / restore session (resurrect)

### พื้นฐาน
set -g mouse on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 10
set -g focus-events on
set -g set-clipboard on
set -g display-time 2000
set -g status-interval 5
setw -g mode-keys vi

### แยกจอ / นำทาง
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
bind -n S-Left previous-window
bind -n S-Right next-window
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

### ของทุ่นแรงสาย ops
bind S setw synchronize-panes \; display "sync panes: #{?pane_synchronized,ON,OFF}"
bind k display-popup -E -w 90% -h 85% "k9s"
bind i display-popup -E -w 85% -h 80% "kiro-cli chat"
bind t display-popup -E -w 80% -h 70%
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

### status bar — โชว์ k8s context/namespace กันยิงผิดคลัสเตอร์
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left "#[bold,fg=#89b4fa] #S #[default] "
set -g status-left-length 30
setw -g window-status-current-style "bold,fg=#f9e2af"
set -g status-right-length 90
set -g status-right "#{?pane_synchronized,#[fg=red bold]⚠ SYNC #[default],}#(test -f ~/.kube/config && /bin/bash ~/.tmux/kube-tmux/kube.tmux 250 red cyan) #[fg=#a6adc8]%d %b %H:%M"

### plugins (TPM)
# NOTE: tmux >= 3.7 มีบั๊กทำ resurrect พัง — installer จะ apply patch ให้อัตโนมัติ
# ถ้า update plugin (prefix+U) แล้ว resurrect พัง ให้รัน install.sh ซ้ำเพื่อ patch ใหม่
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run '~/.tmux/plugins/tpm/tpm'
